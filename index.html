<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DStv Order Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <form id="orderForm" style="max-width: 500px; margin: auto;">
            <div class="mb-3">
                <label>Sales Representative</label>
                <select id="salesRep" name="sales_rep" class="form-select" required></select>
            </div>
            <div class="mb-3">
                <label>Territory</label>
                <select id="territory" name="territory" class="form-select" required>
                    <option value="">Select Territory</option>
                </select>
            </div>
            <div class="mb-3">
                <label>Electronic Shop (ESP)</label>
                <select id="espSelect" name="esp_name" class="form-select" required></select>
            </div>
            <div class="row">
                <div class="col-6 mb-3"><label>ESP ID</label><input type="text" id="espId" name="esp_id" class="form-control" readonly></div>
                <div class="col-6 mb-3"><label>Phone</label><input type="text" id="espPhone" name="esp_phone" class="form-control" readonly></div>
            </div>
            <div class="mb-3"><label>Delivery Date</label><input type="date" name="delivery_date" class="form-control" required></div>
            <div class="mb-3"><label>Quantity</label><input type="number" name="decoder_qty" class="form-control" min="1" required></div>
            <div class="mb-3"><label>Remarks</label><textarea name="remarks" class="form-control"></textarea></div>
            <button type="submit" id="submitBtn" class="btn btn-primary w-100">SUBMIT ORDER</button>
        </form>
        <div id="statusMsg" class="mt-3 text-center"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
