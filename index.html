<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decoder Stock Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="card shadow-sm mx-auto" style="max-width: 500px;">
            <div class="card-header bg-primary text-white text-center">
                <h5>Decoder Stock Order</h5>
            </div>
            <div class="card-body">
                <form id="orderForm">
                    <div class="mb-3"><label>Order Date</label><input type="text" id="orderDate" class="form-control" readonly></div>
                    <div class="mb-3"><label>Territory</label><select id="territory" class="form-select" required><option value="">Select Territory</option><option value="Hawassa">Hawassa</option></select></div>
                    <div class="mb-3"><label>Electronic Shop (ESP)</label><input class="form-control" list="espList" id="espInput" placeholder="Type to search..." required><datalist id="espList"></datalist></div>
                    <div class="row"><div class="col-6 mb-3"><label>ESP ID</label><input type="text" id="espId" class="form-control" readonly></div><div class="col-6 mb-3"><label>Phone</label><input type="text" id="espPhone" class="form-control" required></div></div>
                    <div class="mb-3"><label>Sales Representative</label><select id="salesRep" class="form-select" required><option value="">Select Rep</option><option value="Abraham">Abraham</option><option value="Samuel">Samuel</option><option value="Hana">Hana</option></select></div>
                    <div class="mb-3"><label>Delivery Date</label><input type="date" id="deliveryDate" class="form-control" required></div>
                    <div class="mb-3"><label>Quantity</label><input type="number" id="qty" class="form-control" min="1" required></div>
                    <div class="mb-3"><label>Remarks</label><textarea id="remarks" class="form-control" rows="2"></textarea></div>
                    <button type="submit" id="submitBtn" class="btn btn-primary w-100">Submit Order</button>
                </form>
                <div id="statusMsg" class="mt-3 text-center fw-bold"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
