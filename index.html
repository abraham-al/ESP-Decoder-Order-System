<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DStv | ESP Order Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container py-4">
        <div class="card p-4 mx-auto" style="max-width: 500px;">
            <h3 class="text-center mb-4">DSTV ESP Decoder Order Collector</h3>
            <form id="orderForm">
                <div class="mb-3">
                    <label class="form-label">Sales Representative</label>
                    <select id="salesRep" name="sales_rep" class="form-select" required>
                        <option value="">Select Representative</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Territory</label>
                    <select id="territory" name="territory" class="form-select" required>
                        <option value="">Select Territory</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Electronic Shop (ESP)</label>
                    <select id="espSelect" name="esp_name" class="form-select" required>
                        <option value="">Select Shop</option>
                    </select>
                </div>
                
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">ESP ID</label>
                        <input type="text" id="espId" name="esp_id" class="form-control" readonly>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" id="espPhone" name="esp_phone" class="form-control" readonly>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Delivery Date</label>
                    <input type="date" id="deliveryDate" name="delivery_date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" id="qty" name="decoder_qty" class="form-control" min="1" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Remarks</label>
                    <textarea id="remarks" name="remarks" class="form-control" rows="2"></textarea>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary w-100">SUBMIT ORDER</button>
            </form>
            <div id="statusMsg" class="mt-3"></div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
